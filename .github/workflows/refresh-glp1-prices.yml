name: Refresh GLP-1 peptide oracle prices

# Runs on GitHub-hosted runners (not your laptop). Requires repo secret:
#   DEPLOYER_PRIVATE_KEY — oracle owner key (push-only privileges recommended)
#
# Scheduled workflows only fire on the default branch after this file is merged.
# Use "Run workflow" for manual tests from any branch.

on:
  schedule:
    # Best-effort only. GitHub routinely delays/skips high-frequency schedules
    # (we observed ~18 runs/day instead of 288). Prefer external cron →
    # POST /api/cron/refresh-oracle (workflow_dispatch) for true 5m cadence.
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Scrape only — do not push on-chain"
        type: boolean
        default: false
      force_push:
        description: "Use forcePushPrice (bypass 30% circuit breaker) — human review only"
        type: boolean
        default: false
      skip_scrape:
        description: "Skip live scrape; use reference JSON only"
        type: boolean
        default: false
      skip_scouter:
        description: "Skip PeptideScouter; vendor basket only"
        type: boolean
        default: false
      skip_basket:
        description: "Skip vendor basket; PeptideScouter only"
        type: boolean
        default: false

concurrency:
  group: glp1-oracle-refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  push-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Scrape (weighted dual-source) + push GLP-1 prices on-chain
        env:
          ROBINHOOD_TESTNET_RPC: https://rpc.testnet.chain.robinhood.com
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          # inputs.* only set on workflow_dispatch; schedule runs get false/empty.
          DRY_RUN: ${{ inputs.dry_run == true && '1' || '0' }}
          FORCE_PUSH: ${{ inputs.force_push == true && '1' || '0' }}
          SKIP_SCRAPE: ${{ inputs.skip_scrape == true && '1' || '0' }}
          SKIP_SCOUTER: ${{ inputs.skip_scouter == true && '1' || '0' }}
          SKIP_BASKET: ${{ inputs.skip_basket == true && '1' || '0' }}
          # Scheduled runs fail loud if scrape breaks (no silent stale JSON push).
          FALLBACK_ON_SCRAPE_ERROR: "0"
          # B2B webhook fanout after successful pushes
          ORACLE_API_FANOUT_URL: ${{ secrets.ORACLE_API_FANOUT_URL }}
          ORACLE_ADMIN_SECRET: ${{ secrets.ORACLE_ADMIN_SECRET }}
        run: npx hardhat run scripts/push-glp1-prices.ts --network robinhoodTestnet

      - name: Push LLY-PERP from RH mainnet stock token + equity quote
        if: success()
        env:
          ROBINHOOD_TESTNET_RPC: https://rpc.testnet.chain.robinhood.com
          ROBINHOOD_MAINNET_RPC: https://rpc.mainnet.chain.robinhood.com
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          DRY_RUN: ${{ inputs.dry_run == true && '1' || '0' }}
        run: npx hardhat run scripts/push-market-prices.ts --network robinhoodTestnet
        continue-on-error: true

      - name: Upload scrape snapshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: glp1-last-scrape-${{ github.run_id }}
          path: |
            contracts/data/glp1-last-scrape.json
            contracts/data/price-history.json
            frontend/public/data/price-history.json
          if-no-files-found: ignore
          retention-days: 14

      # Keep chart history on main so /trade + /oracle pick up new samples.
      # NEVER commit merge-conflict markers — that 500s /api/oracle/monitor
      # (git pull --rebase --autostash previously wrote <<<<<<< Updated upstream).
      - name: Commit price history
        if: success() && github.ref == 'refs/heads/main'
        working-directory: .
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          DATA_FILES=(
            contracts/data/price-history.json
            contracts/data/glp1-last-scrape.json
            frontend/public/data/price-history.json
            frontend/public/data/glp1-last-scrape.json
          )

          merge_histories() {
            node <<'NODE'
          const fs = require("fs");
          const path = require("path");
          const paths = [
            "contracts/data/price-history.json",
            "frontend/public/data/price-history.json",
          ];
          const NOTE =
            "Oracle mark samples for PEPT Trade charts. Appended on each successful pushPrice (~5m cron). Fine TFs (5m/15m) need dense samples; coarser TFs still stair-step when marks are quiet.";
          function load(p) {
            try {
              if (!fs.existsSync(p)) return [];
              const t = fs.readFileSync(p, "utf8");
              if (t.includes("<<<<<<<") || t.includes(">>>>>>>")) {
                console.warn("skip conflicted", p);
                const re =
                  /\{\s*"market"\s*:\s*"([^"]+)"\s*,\s*"ts"\s*:\s*(\d+)\s*,\s*"price"\s*:\s*([0-9.eE+-]+)[^}]*\}/g;
                const out = [];
                let m;
                while ((m = re.exec(t))) {
                  out.push({ market: m[1], ts: Number(m[2]), price: Number(m[3]) });
                }
                return out;
              }
              const j = JSON.parse(t);
              return Array.isArray(j.samples) ? j.samples : [];
            } catch (e) {
              console.warn("load fail", p, e.message);
              return [];
            }
          }
          const map = new Map();
          for (const p of paths) {
            for (const s of load(p)) {
              if (!s?.market || !s.ts || !Number.isFinite(s.price)) continue;
              const k = `${s.market}|${s.ts}|${Number(s.price).toFixed(6)}`;
              const prev = map.get(k);
              if (!prev || (s.txHash && !prev.txHash)) map.set(k, s);
            }
          }
          let samples = [...map.values()].sort(
            (a, b) => a.ts - b.ts || a.market.localeCompare(b.market),
          );
          if (samples.length > 20000) samples = samples.slice(samples.length - 20000);
          if (samples.length === 0) {
            console.error("merge_histories: no samples — refusing to write empty");
            process.exit(2);
          }
          const body =
            JSON.stringify(
              { updatedAt: new Date().toISOString(), note: NOTE, samples },
              null,
              2,
            ) + "\n";
          for (const p of paths) {
            fs.mkdirSync(path.dirname(p), { recursive: true });
            fs.writeFileSync(p, body);
            console.log("wrote", p, "n=", samples.length);
          }
          NODE
          }

          assert_clean_json() {
            for f in "${DATA_FILES[@]}"; do
              [ -f "$f" ] || continue
              if grep -qE '^(<<<<<<<|=======|>>>>>>>)' "$f"; then
                echo "ERROR: conflict markers in $f"
                return 1
              fi
            done
            node -e "const j=require('./frontend/public/data/price-history.json'); if(!Array.isArray(j.samples)||!j.samples.length) process.exit(1)"
          }

          merge_histories
          assert_clean_json
          git add -f "${DATA_FILES[@]}" 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No history/scrape changes to commit"
            exit 0
          fi
          git commit -m "chore: append oracle price history + scrape snapshot [skip ci]"

          # Commit first, then rebase (no --autostash — that left <<<<<<< markers)
          for i in 1 2 3 4; do
            git fetch origin main
            if git rebase origin/main; then
              assert_clean_json || {
                merge_histories
                assert_clean_json
                git add -f "${DATA_FILES[@]}"
                git commit --amend --no-edit
              }
              if git push origin HEAD:main; then
                echo "History pushed"
                exit 0
              fi
              echo "Push rejected (attempt $i)…"
            else
              echo "Rebase conflict (attempt $i) — densest sample merge"
              git checkout --ours -- contracts/data/price-history.json frontend/public/data/price-history.json 2>/dev/null || true
              git checkout --theirs -- contracts/data/glp1-last-scrape.json frontend/public/data/glp1-last-scrape.json 2>/dev/null || true
              # Keep this run's scrape if present
              merge_histories
              git add -f "${DATA_FILES[@]}" 2>/dev/null || true
              GIT_EDITOR=true git rebase --continue || {
                git rebase --abort || true
                merge_histories
                assert_clean_json
                git add -f "${DATA_FILES[@]}"
                git commit -m "chore: append oracle price history + scrape snapshot [skip ci]" || true
              }
            fi
          done
          exit 1
